<text x="30" y="238" font-family="monospace" font-size="14" fill="#d4d4d4">Executing Rule: <tspan fill="#569cd6">Check_Leverage</tspan></text>
<text x="30" y="262" font-family="monospace" font-size="14" fill="#d4d4d4">  Value: Debt/Equity = 1.8</text>
<text x="30" y="286" font-family="monospace" font-size="14" fill="#d4d4d4">  Threshold: < 3.0</text>

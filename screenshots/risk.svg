<text x="30" y="166" font-family="monospace" font-size="14" fill="#d4d4d4">  Threshold: > 1.33</text>
<text x="30" y="190" font-family="monospace" font-size="14" fill="#d4d4d4">  <tspan fill="#ff5f56">ALERT:</tspan> Current Ratio is below banking norms.</text>

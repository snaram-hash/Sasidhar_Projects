    <!-- Title -->
    <text x="400" y="35" font-family="sans-serif" font-size="14" font-weight="600" fill="#888888" text-anchor="middle">Terminal - risk_policy_engine.py</text>
    <path d="M 10 50 L 790 50" stroke="#333333" stroke-width="1"/>
    
    <!-- Content -->
    <text x="30" y="70" font-family="monospace" font-size="14" fill="#d4d4d4"><tspan fill="#4ec9b0">INFO</tspan> [RiskPolicyEngine] Evaluating Borrower ID: HARIKA-001</text>

<text x="30" y="334" font-family="monospace" font-size="14" fill="#d4d4d4"></text>
<text x="30" y="358" font-family="monospace" font-size="14" fill="#d4d4d4">Executing Rule: <tspan fill="#569cd6">Check_Bounce_Rate</tspan></text>
<text x="30" y="382" font-family="monospace" font-size="14" fill="#d4d4d4">  Value: Bounce Rate = 1.4%</text>

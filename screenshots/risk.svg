<text x="30" y="430" font-family="monospace" font-size="14" fill="#d4d4d4">  <tspan fill="#27c93f">PASS</tspan></text>
<text x="30" y="454" font-family="monospace" font-size="14" fill="#d4d4d4"></text>
<text x="30" y="478" font-family="monospace" font-size="14" fill="#d4d4d4"><tspan fill="#ffbd2e">FINAL DECISION:</tspan> Refer to Credit Committee (1 Alert Triggered)</text>


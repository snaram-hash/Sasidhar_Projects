<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
    <defs>
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.3"/>
        </filter>
    </defs>
    <rect x="10" y="10" width="780" height="430" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Mac OS Controls -->
    <circle cx="35" cy="30" r="6" fill="#ff5f56"/>
    <circle cx="55" cy="30" r="6" fill="#ffbd2e"/>
    <circle cx="75" cy="30" r="6" fill="#27c93f"/>
    
    <!-- Title -->
    <text x="400" y="35" font-family="sans-serif" font-size="14" font-weight="600" fill="#888888" text-anchor="middle">Browser - Interactive Dashboard</text>
    <path d="M 10 50 L 790 50" stroke="#333333" stroke-width="1"/>
    
    <!-- Content -->
    <text x="30" y="70" font-family="monospace" font-size="14" fill="#333333"><tspan fill="#000000">Interactive Glassmorphism UI Rendered</tspan></text>
<text x="30" y="94" font-family="monospace" font-size="14" fill="#333333"><tspan fill="#000000">Chart.js Working Capital Gauges: ACTIVE</tspan></text>
<text x="30" y="118" font-family="monospace" font-size="14" fill="#333333"><tspan fill="#000000">Data Source: Embedded JSON from SQLite</tspan></text>
<text x="30" y="142" font-family="monospace" font-size="14" fill="#333333"><tspan fill="#0066cc">Status: Ready for offline distribution.</tspan></text>

</svg>
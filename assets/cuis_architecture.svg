<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
        
        <linearGradient id="boxBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e3a8a" />
            <stop offset="100%" stop-color="#1d4ed8" />
        </linearGradient>

        <linearGradient id="boxGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#064e3b" />
            <stop offset="100%" stop-color="#047857" />
        </linearGradient>
        
        <linearGradient id="boxPurple" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4c1d95" />
            <stop offset="100%" stop-color="#6d28d9" />
        </linearGradient>

        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.4" />
        </filter>
        
        <!-- Arrowhead marker -->
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
        </marker>
    </defs>
    
    <rect width="1000" height="600" fill="url(#bg)" />
    
    <g font-family="system-ui, sans-serif" fill="#ffffff" text-anchor="middle">
        
        <!-- Layer Titles -->
        <text x="500" y="50" font-size="20" font-weight="600" fill="#94a3b8" letter-spacing="2">SYSTEM ARCHITECTURE</text>
        
        <!-- 1. Input -->
        <rect x="400" y="80" width="200" height="60" rx="10" fill="#334155" filter="url(#shadow)" />
        <text x="500" y="115" font-size="16" font-weight="600">Borrower Documents</text>
        <path d="M 500 140 L 500 170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
        
        <!-- 2. Parsers Container -->
        <rect x="150" y="180" width="700" height="120" rx="15" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,8" />
        <text x="500" y="170" font-size="14" fill="#94a3b8" font-weight="500">Extraction Engines</text>
        
        <!-- Parsers -->
        <rect x="200" y="210" width="160" height="60" rx="10" fill="url(#boxBlue)" filter="url(#shadow)" />
        <text x="280" y="245" font-size="14" font-weight="600">Financial Engine</text>
        
        <rect x="420" y="210" width="160" height="60" rx="10" fill="url(#boxBlue)" filter="url(#shadow)" />
        <text x="500" y="245" font-size="14" font-weight="600">Banking Engine</text>
        
        <rect x="640" y="210" width="160" height="60" rx="10" fill="url(#boxBlue)" filter="url(#shadow)" />
        <text x="720" y="245" font-size="14" font-weight="600">Bureau Engine</text>
        
        <!-- Arrows Down -->
        <path d="M 280 270 L 280 320 L 490 320 L 490 340" stroke="#94a3b8" stroke-width="2" fill="none" />
        <path d="M 500 270 L 500 340" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
        <path d="M 720 270 L 720 320 L 510 320 L 510 340" stroke="#94a3b8" stroke-width="2" fill="none" />
        
        <!-- 3. Intelligence Core -->
        <rect x="350" y="350" width="300" height="80" rx="10" fill="url(#boxPurple)" filter="url(#shadow)" />
        <text x="500" y="385" font-size="16" font-weight="600">Centralized Brain</text>
        <text x="500" y="410" font-size="12" fill="#cbd5e1">SQLite DB + Reconciliation</text>
        
        <path d="M 500 430 L 500 460" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
        
        <!-- 4. Outputs Container -->
        <rect x="250" y="470" width="500" height="90" rx="15" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,8" />
        <text x="500" y="460" font-size="14" fill="#94a3b8" font-weight="500">Presentation Layer</text>
        
        <!-- Outputs -->
        <rect x="300" y="490" width="160" height="50" rx="10" fill="url(#boxGreen)" filter="url(#shadow)" />
        <text x="380" y="520" font-size="14" font-weight="600">HTML Dashboard</text>
        
        <rect x="540" y="490" width="160" height="50" rx="10" fill="url(#boxGreen)" filter="url(#shadow)" />
        <text x="620" y="520" font-size="14" font-weight="600">Excel CAM Sheet</text>
        
        <path d="M 500 460 L 500 480" stroke="#94a3b8" stroke-width="2" fill="none" />
        <path d="M 380 480 L 380 490" stroke="#94a3b8" stroke-width="2" fill="none" />
        <path d="M 620 480 L 620 490" stroke="#94a3b8" stroke-width="2" fill="none" />
        <path d="M 380 480 L 620 480" stroke="#94a3b8" stroke-width="2" fill="none" />
        
    </g>
</svg>
